name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# 기초공사 안전망: 모든 푸시/PR에서 정합성 게이트를 강제한다.
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npm run db:generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # 빌드는 키 없이도 통과해야 함(로컬/익명 모드 graceful degradation)
          NEXT_TELEMETRY_DISABLED: "1"
